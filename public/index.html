<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Bitcoin Tracker</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>₿</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="viz-root">
    <header class="topbar">
      <div class="title-block">
        <h1>Bitcoin Tracker</h1>
        <p id="subtitle" class="subtitle">Loading…</p>
      </div>
      <div class="topbar-actions">
        <button id="sync-btn" class="btn" type="button">Sync now</button>
        <button id="theme-btn" class="btn btn-icon" type="button" aria-label="Toggle theme">◐</button>
      </div>
    </header>

    <div id="banner" class="banner" hidden></div>

    <main id="main">
      <section id="tiles" class="tiles" aria-label="Portfolio summary"></section>

      <section class="two-col">
        <div class="card" id="locations-card">
          <h2>Where it lives</h2>
          <div id="locations"></div>
        </div>
        <div class="card" id="activity-card">
          <h2>Buying activity</h2>
          <div id="activity"></div>
        </div>
      </section>

      <div class="filter-row" role="toolbar" aria-label="Date range">
        <span class="filter-label">Range</span>
        <div class="segmented" id="range-buttons">
          <button data-range="90d" type="button">90D</button>
          <button data-range="1y" type="button">1Y</button>
          <button data-range="2y" type="button">2Y</button>
          <button data-range="all" type="button" class="active">All</button>
        </div>
      </div>

      <section class="card chart-card" id="value-card">
        <div class="card-head">
          <h2>Invested vs. portfolio value</h2>
          <div class="segmented small view-toggle" data-for="value">
            <button data-view="chart" class="active" type="button">Chart</button>
            <button data-view="table" type="button">Table</button>
          </div>
        </div>
        <div id="value-chart" class="chart"></div>
        <div id="value-table" class="table-wrap" hidden></div>
      </section>

      <section class="card chart-card" id="buys-card">
        <div class="card-head">
          <h2>Your buys vs. the market</h2>
          <div class="segmented small view-toggle" data-for="buys">
            <button data-view="chart" class="active" type="button">Chart</button>
            <button data-view="table" type="button">Table</button>
          </div>
        </div>
        <div id="buys-chart" class="chart"></div>
        <div id="buys-table" class="table-wrap" hidden></div>
      </section>

      <section class="card">
        <div class="card-head">
          <h2>Transactions</h2>
          <span id="tx-count" class="muted"></span>
        </div>
        <div id="tx-table" class="table-wrap"></div>
      </section>

      <footer id="footer" class="footer"></footer>
    </main>
  </div>
  <div id="tooltip" class="tooltip" hidden></div>
  <script src="app.js"></script>
</body>
</html>
